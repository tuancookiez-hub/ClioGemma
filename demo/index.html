<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ClioGemma · Video captioning</title>
  <style>
    :root{--bg:#090909;--panel:#111110;--line:#282621;--gold:#d9a638;--text:#f2eee4;--muted:#918d83;--green:#7fc77d;--red:#df8d7b}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% -20%,#2b2414 0,#0a0a09 35%,var(--bg) 70%);color:var(--text);font-family:Georgia,'Times New Roman',serif;min-height:100vh}
    header{height:92px;border-bottom:1px solid #201f1b;display:flex;align-items:center;padding:0 clamp(22px,4vw,64px);gap:24px;background:#0b0b0bda;backdrop-filter:blur(12px)}
    .brand{display:flex;align-items:center;gap:14px;font-size:30px;letter-spacing:-.6px;white-space:nowrap}.emblem{width:46px;height:46px;border:2px solid var(--gold);border-radius:50%;display:grid;place-items:center;color:var(--gold);font-size:25px;box-shadow:0 0 18px #d9a63845}.brand span{color:var(--gold)}.divider{height:36px;width:1px;background:var(--gold);opacity:.55}.product{font-size:22px;color:#d4d0c8}.top-actions{margin-left:auto;display:flex;align-items:center;gap:12px}.status{border:1px solid #2d2a23;border-radius:13px;padding:13px 20px;display:flex;align-items:center;gap:10px;color:#ddd7cc;font-size:16px}.dot{width:10px;height:10px;background:var(--gold);border-radius:50%;box-shadow:0 0 10px var(--gold)}.icon{width:45px;height:45px;border:1px solid #2d2a23;background:transparent;color:#d7d0c2;border-radius:12px;font-size:20px}
    main{max-width:1450px;margin:0 auto;padding:38px clamp(18px,3vw,40px) 56px}.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:24px}.card{border:1px solid var(--line);border-radius:14px;background:#10100fed;box-shadow:0 22px 70px #00000038;padding:30px}.card h2{margin:0 0 24px;font-size:24px;font-weight:400}.drop{height:266px;border:1px dashed #3b372d;border-radius:12px;display:grid;place-items:center;text-align:center;background:linear-gradient(180deg,#14130f,#10100f);cursor:pointer;transition:.2s}.drop:hover,.drop.over{border-color:var(--gold);background:#17140d}.upload-icon{font-family:Arial;font-size:42px;color:var(--gold);line-height:1;margin-bottom:12px}.drop p{margin:8px 0;color:#e2ded5;font-size:17px}.drop small{color:var(--muted);font:14px Arial,sans-serif}.drop b{color:var(--gold);font-weight:400}.or{display:flex;align-items:center;gap:15px;color:#c9c4ba;justify-content:center;margin:19px 0;font-size:15px}.or:before,.or:after{content:'';height:1px;background:#282621;flex:1}.url-row{display:flex;gap:10px}.input{width:100%;background:#0d0d0c;border:1px solid #2e2b25;border-radius:10px;color:#ddd7ce;padding:14px 16px;font:15px Arial,sans-serif;outline:none}.input:focus{border-color:var(--gold)}.button{border:1px solid #60491e;background:transparent;color:var(--gold);border-radius:10px;padding:0 19px;font:15px Georgia;white-space:nowrap}.button:hover{background:#2b2110}.field{margin-bottom:19px}.field label{display:block;color:#ded8cd;font-size:17px;margin-bottom:9px}.select{appearance:none;width:100%;background:#11110f;border:1px solid #2d2a24;border-radius:10px;color:#e5e0d6;padding:14px 16px;font:16px Georgia}.select:focus{outline:1px solid var(--gold)}.toggle-row{display:flex;justify-content:space-between;align-items:center;margin:25px 0 28px}.toggle-title{font-size:17px}.toggle-title small{display:block;color:var(--muted);font:14px Arial;margin-top:6px}.toggle{width:55px;height:31px;background:#372f1e;border-radius:22px;padding:4px;cursor:pointer}.toggle i{display:block;width:23px;height:23px;background:var(--gold);border-radius:50%;transition:.2s}.toggle.off i{transform:translateX(0);background:#777269}.toggle:not(.off) i{transform:translateX(24px)}.generate{width:100%;padding:17px;background:linear-gradient(135deg,#d9a638,#b77e1d);border:0;border-radius:10px;color:#171208;font:18px Georgia;cursor:pointer;box-shadow:0 9px 24px #d9a63822}.generate:hover{filter:brightness(1.1)}.generate:disabled{opacity:.55;cursor:wait}.message{min-height:22px;color:var(--muted);font:13px Arial;margin-top:15px}.message.error{color:var(--red)}.message.ok{color:var(--green)}
    .recent{margin-top:24px}.recent-head{display:flex;justify-content:space-between;align-items:center}.recent-head h2{margin-bottom:0}.recent-head a{color:var(--gold);font-size:16px}.jobs{margin-top:24px;min-height:180px;border:1px solid var(--line);border-radius:12px;padding:20px}.empty{text-align:center;color:var(--muted);padding:38px;font-size:17px}.empty .box{font:38px Arial;color:#80796b;margin-bottom:10px}.job{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #27251f;padding:15px 6px;font:14px Arial;color:#d9d2c7}.job:last-child{border:0}.job small{display:block;color:var(--muted);margin-top:5px}.pill{border:1px solid #355a34;color:var(--green);border-radius:20px;padding:5px 9px;font-size:12px}.result{margin-top:24px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.caption{border:1px solid #2c2923;border-radius:10px;padding:15px;background:#13120f}.caption h3{color:var(--gold);font:14px Arial;text-transform:uppercase;letter-spacing:.12em;margin:0 0 9px}.caption p{margin:0;color:#e7e1d6;line-height:1.45;font-size:16px}.json{font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;color:#d6c68f}.hidden{display:none}@media(max-width:900px){.grid{grid-template-columns:1fr}.brand{font-size:24px}.product{display:none}.status{font-size:13px;padding:10px}.card{padding:22px}}@media(max-width:520px){header{padding:0 16px}.top-actions .icon{display:none}.brand{font-size:20px}.emblem{width:37px;height:37px;font-size:20px}.result{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div class="brand"><div class="emblem">C</div><span>ClioGemma</span><div class="divider"></div><div class="product">Video captioning</div></div><div class="top-actions"><div class="status"><i class="dot"></i><span id="status">Checking Gemma…</span></div><button class="icon" title="Settings">⚙</button></div></header>
  <main>
    <div class="grid">
      <section class="card"><h2>Upload video</h2><input id="file" type="file" accept="video/mp4,video/quicktime,video/webm" class="hidden"><div id="drop" class="drop"><div><div class="upload-icon">⇧</div><p>Drag and drop a video file, or <b>browse</b></p><small>MP4, MOV, WEBM up to 512 MB</small></div></div><div class="or">or</div><div class="url-row"><input id="url" class="input" placeholder="https://example.com/video.mp4"><button id="add" class="button">Add URL</button></div><div id="source" class="message"></div></section>
      <section class="card"><h2>Caption settings</h2><div class="field"><label for="style">Style</label><select id="style" class="select"><option value="all">All four styles</option><option value="formal">Formal</option><option value="sarcastic">Sarcastic</option><option value="humorous_tech">Humorous tech</option><option value="humorous_non_tech">Humorous non-tech</option></select></div><div class="field"><label for="output">Output</label><select id="output" class="select"><option value="cards">Caption cards</option><option value="json">JSON</option></select></div><div class="toggle-row"><div class="toggle-title">Evidence-first mode<small>Ground captions in visible frames</small></div><div class="toggle"><i></i></div></div><button id="generate" class="generate">✦ &nbsp; Generate captions</button><div id="message" class="message"></div></section>
    </div>
    <section class="card recent"><div class="recent-head"><h2>Recent jobs</h2><a href="#" id="refresh">Refresh ↗</a></div><div id="jobs" class="jobs"><div class="empty"><div class="box">⌂</div>No recent caption jobs<small>Your generated captions will appear here.</small></div></div><div id="result" class="result hidden"></div></section>
  </main>
  <script>
    const $=id=>document.getElementById(id), file=$('file'), drop=$('drop'), url=$('url'), source=$('source'), message=$('message'), jobs=$('jobs'), result=$('result');
    let selected=null;
    function setSource(text,ok=false){source.textContent=text;source.className='message'+(ok?' ok':'')}
    drop.onclick=()=>file.click(); file.onchange=()=>{selected=file.files[0]||null;setSource(selected?selected.name:'')};
    ['dragenter','dragover'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.add('over')})); ['dragleave','drop'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.remove('over')}));
    drop.addEventListener('drop',e=>{selected=e.dataTransfer.files[0]||null;setSource(selected?selected.name:'')}); $('add').onclick=()=>{if(url.value.trim()){selected=null;file.value='';setSource(url.value.trim(),true)}};
    function renderResult(data){result.classList.remove('hidden');result.innerHTML='';const mode=$('output').value;if(mode==='json'){const pre=document.createElement('pre');pre.className='caption json';pre.textContent=JSON.stringify(data.captions,null,2);result.append(pre);return}for(const [style,text] of Object.entries(data.captions||{})){const card=document.createElement('div');card.className='caption';card.innerHTML='<h3>'+style.replaceAll('_',' ')+'</h3><p></p>';card.querySelector('p').textContent=text;result.append(card)}}
    function renderJobs(items){if(!items.length){jobs.innerHTML='<div class="empty"><div class="box">⌂</div>No recent caption jobs<small>Your generated captions will appear here.</small></div>';return}jobs.innerHTML='';items.forEach(j=>{const row=document.createElement('div');row.className='job';row.innerHTML='<div><b>'+j.job_id+'</b><small>'+String(j.source||'uploaded video')+' · '+(j.elapsed_s||'—')+'s</small></div><span class="pill">'+j.status+'</span>';jobs.append(row)})}
    async function refresh(){try{const r=await fetch('/api/jobs');renderJobs((await r.json()).jobs||[])}catch(e){}}
    $('refresh').onclick=e=>{e.preventDefault();refresh()};
    $('generate').onclick=async()=>{message.className='message';message.textContent='Generating with Novita Gemma…';$('generate').disabled=true;const form=new FormData();form.append('style',$('style').value);if(selected)form.append('video',selected);if(url.value.trim())form.append('video_url',url.value.trim());try{const r=await fetch('/api/caption',{method:'POST',body:form});const data=await r.json();if(!r.ok)throw new Error(data.error||'Generation failed');renderResult(data);message.className='message ok';message.textContent='Complete · '+data.frame_count+' frames · '+data.elapsed_s+'s';refresh()}catch(e){message.className='message error';message.textContent=e.message}finally{$('generate').disabled=false}};
    (async()=>{try{const r=await fetch('/api/health');const h=await r.json();$('status').textContent=h.configured?(h.model.includes('31b')?'Gemma 4 · Ready':'Gemma 3 · Ready'):'Demo · Key needed';if(!h.configured){$('status').previousElementSibling.style.background='#b78735'}}catch(e){$('status').textContent='Demo · Offline'}refresh()})();
  </script>
</body>
</html>
